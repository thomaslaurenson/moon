name: Main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "**.go"
      - go.mod
      - go.sum
      - Makefile
      - ".goreleaser*.yml"
      - .gpipe.yml
      - "src/**"
      - "bundles/**"

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
  test:
    uses: ./.github/workflows/test.yml
  prerelease:
    needs: [lint, test]
    uses: ./.github/workflows/prerelease.yml
    permissions:
      contents: write
