name: Prerelease

on:
  workflow_call:

jobs:
  prerelease:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --snapshot --clean --config .goreleaser.prerelease.yml

      - uses: thomaslaurenson/gpipe-action@v1
        with:
          # gpipe always validates in strict mode (no --dry-run passthrough) and
          # rejects anything but a bare v?X.Y.Z with no suffix, so the rolling
          # prerelease can't be tagged "dev" or "X.Y.Z-dev". VERSION is also
          # baked into install.sh's download URL, so it must equal the actual
          # release tag below, not just look like a version.
          version: "v0.0.0"
          cosign_sign: true

      - name: Delete existing dev release
        run: |
          if gh release view v0.0.0 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete v0.0.0 --repo "${{ github.repository }}" --yes --cleanup-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create prerelease
        run: |
          gh release create v0.0.0 \
            dist/moon-* \
            install.sh install.ps1 \
            checksums.txt checksums.txt.sigstore.json \
            --prerelease \
            --title dev \
            --notes "Latest development build from main."
        env:
          GH_TOKEN: ${{ github.token }}
