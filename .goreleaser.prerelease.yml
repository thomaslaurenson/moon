# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: moon
builds:
  - env: [CGO_ENABLED=0]
    mod_timestamp: "{{ .CommitTimestamp }}"
    binary: >-
      moon-{{ .Os }}-{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "arm64" }}aarch64{{ else }}{{ .Arch }}{{ end }}
    no_unique_dist_dir: true
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - {goos: windows, goarch: arm64}
    ldflags:
      - -s -w -X github.com/thomaslaurenson/moon/cmd.Version={{.Version}}
snapshot:
  version_template: "{{ incpatch .Version }}-dev"
git:
  # v0.0.0 is the rolling prerelease's own tag (see prerelease.yml); it must not
  # be picked up as "the last tag" when computing incpatch above.
  ignore_tags: ["v0.0.0"]
